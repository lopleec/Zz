name: Zz
options:
  bundleIdPrefix: com.zz
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.38"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: false
    CODE_SIGN_ENTITLEMENTS: Zz/Zz.entitlements
    ENABLE_HARDENED_RUNTIME: false
    INFOPLIST_FILE: Zz/Info.plist
    PRODUCT_NAME: Zz
    EXECUTABLE_NAME: Zz
    INFOPLIST_KEY_CFBundleDisplayName: Zz
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity

targets:
  Zz:
    type: application
    platform: macOS
    sources:
      - path: Zz
        excludes:
          - "*.entitlements"
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zz.app
        PRODUCT_NAME: Zz
        EXECUTABLE_NAME: Zz
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: Zz/Info.plist
        CODE_SIGN_ENTITLEMENTS: Zz/Zz.entitlements
        ENABLE_HARDENED_RUNTIME: false
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
    info:
      path: Zz/Info.plist
